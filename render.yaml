services:
  - type: web
    name: ai-resume-screener
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: FLASK_DEBUG
        value: "false"
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
